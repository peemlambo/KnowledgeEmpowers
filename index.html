  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #f3f2f2;\n  --color-surface: #eae9e9;\n  --color-text: #201e1d;\n  --color-accent: #ec3013;\n  --color-accent-2: #e15b47;\n  --color-divider: color-mix(in srgb, #201e1d 40%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f8f4f4;\n  --color-neutral-200: #eae7e7;\n  --color-neutral-300: #d7d3d3;\n  --color-neutral-400: #bab6b6;\n  --color-neutral-500: #9b9797;\n  --color-neutral-600: #7d7979;\n  --color-neutral-700: #605d5d;\n  --color-neutral-800: #444141;\n  --color-neutral-900: #2d2b2b;\n\n  --color-accent-100: #fff2ef;\n  --color-accent-200: #ffe0d9;\n  --color-accent-300: #ffc4b8;\n  --color-accent-400: #ff9783;\n  --color-accent-500: #ff563c;\n  --color-accent-600: #dd2b0f;\n  --color-accent-700: #ae1800;\n  --color-accent-800: #7c1405;\n  --color-accent-900: #4d170e;\n\n  --color-accent-2-100: #fff2ef;\n  --color-accent-2-200: #ffe0da;\n  --color-accent-2-300: #ffc4b9;\n  --color-accent-2-400: #ff9784;\n  --color-accent-2-500: #ef6853;\n  --color-accent-2-600: #c94b39;\n  --color-accent-2-700: #9e3526;\n  --color-accent-2-800: #71261b;\n  --color-accent-2-900: #471d16;\n\n  --font-heading: \"Archivo\", system-ui, sans-serif;\n  --font-heading-weight: 800;\n  --font-body: \"Archivo\", system-ui, sans-serif;\n\n  --space-1: 4.0px;\n  --space-2: 8.0px;\n  --space-3: 12.0px;\n  --space-4: 16.0px;\n  --space-6: 24.0px;\n  --space-8: 32.0px;\n\n  --radius-sm: 0px;\n  --radius-md: 0px;\n  --radius-lg: 0px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2d2b2b 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.grayscale{filter:grayscale(1) contrast(1.08)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 2px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); justify-content: flex-start; text-align: left; }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: 2px solid var(--color-divider);\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 2px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid var(--color-divider);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n<\u002Fstyle>\n  <script src=\"5e9b725b-2a07-4cb7-800b-f3dc1634c8e5\"><\u002Fscript>\n  <script src=\"31cc1ea2-61bf-4c4c-bb1f-74d3ff8f07e3\"><\u002Fscript>\n  <script src=\"4cc0ce85-c23c-409e-8d01-890b11f907eb\"><\u002Fscript>\n  <style>\n    body { margin: 0; }\n    .ke-icon { width: 16px; height: 16px; display: block; }\n    :root {\n      --color-accent: oklch(32% 0.13 15);\n      --color-accent-100: oklch(94% 0.02 15);\n      --color-accent-200: oklch(88% 0.05 15);\n      --color-accent-300: oklch(80% 0.08 15);\n      --color-accent-400: oklch(64% 0.12 15);\n      --color-accent-500: oklch(48% 0.14 15);\n      --color-accent-600: oklch(38% 0.135 15);\n      --color-accent-700: oklch(30% 0.12 15);\n      --color-accent-800: oklch(22% 0.09 15);\n      --color-accent-900: oklch(15% 0.06 15);\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"min-height:100vh; display:flex; align-items:center; justify-content:center; padding:var(--space-6); box-sizing:border-box; background:var(--color-bg);\">\n  <div class=\"card elev-md\" style=\"width:100%; max-width:400px; gap:var(--space-4);\">\n    <div style=\"display:flex; align-items:center; gap:var(--space-2); border-bottom:2px solid var(--color-divider); padding-bottom:var(--space-3);\">\n      <img src=\"634efe03-3567-477c-ac9a-4cebbe028463\" alt=\"KnowledgeEmpowers logo\" style=\"height:32px; width:auto; flex-shrink:0;\">\n      <h3 style=\"margin:0;\">KnowledgeEmpowers<\u002Fh3>\n    <\u002Fdiv>\n    <div class=\"text-muted\" style=\"font-size:13px;\">Sign in to continue<\u002Fdiv>\n\n    <div cla "btn btn-ghost\" sc-camel-on-click=\"{{ item.onDelete }}\">Delete<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ hasNoNotifications }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"text-muted\" style=\"font-size:13px;\">No announcements yet.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showStudents }}\" hint-placeholder-val=\"{{ false }}\">\n      <sc-if value=\"{{ hasStudents }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; flex-direction:column; gap:var(--space-2);\">\n          <sc-for list=\"{{ studentProfiles }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <div class=\"card\" style=\"gap:var(--space-2);\">\n              <div class=\"card-title\" style=\"font-size:15px;\">{{ item.name }}<\u002Fdiv>\n              <div class=\"card-meta\">Username: {{ item.username }}<\u002Fdiv>\n              <div style=\"display:flex; gap:var(--space-3); flex-wrap:wrap;\">\n                <div class=\"tag tag-neutral\">{{ item.homeworkCount }} homework<\u002Fdiv>\n                <div class=\"tag tag-neutral\">{{ item.resourceCount }} resources<\u002Fdiv>\n                <div class=\"tag tag-neutral\">{{ item.scheduleCount }} classes/week<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ hasNoStudents }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"text-muted\" style=\"font-size:13px;\">No students yet — add one from the Users tab.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showUsers }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"card\" style=\"margin-bottom:var(--space-4); gap:var(--space-3);\">\n        <div class=\"card-title\" style=\"font-size:14px;\">Add account<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:{{ formGridUser }}; gap:var(--space-3); align-items:end;\">\n          <div class=\"field\"><label>Full name<\u002Flabel><input class=\"input\" value=\"{{ newUserName }}\" sc-camel-on-change=\"{{ setNewUserName }}\"><\u002Fdiv>\n          <div class=\"field\"><label>Username<\u002Flabel><input class=\"input\" value=\"{{ newUserUsername }}\" sc-camel-on-change=\"{{ setNewUserUsername }}\"><\u002Fdiv>\n          <div class=\"field\"><label>Password<\u002Flabel><input class=\"input\" type=\"text\" value=\"{{ newUserPassword }}\" sc-camel-on-change=\"{{ setNewUserPassword }}\"><\u002Fdiv>\n          <div class=\"field\"><label>Role<\u002Flabel>\n            <sc-raw-select class=\"input\" value=\"{{ newUserRole }}\" sc-camel-on-change=\"{{ setNewUserRole }}\">\n              <option value=\"student\">Student<\u002Foption>\n              <option value=\"teacher\">Teacher<\u002Foption>\n              <option value=\"parent\">Parent<\u002Foption>\n            <\u002Fsc-raw-select>\n          <\u002Fdiv>\n          <button class=\"btn btn-primary\" sc-camel-on-click=\"{{ addUser }}\">Add<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasUserError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12px; color:var(--color-accent-700);\">{{ userError }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"overflow-x:auto;\">\n      <sc-raw-table class=\"table\">\n        <sc-raw-thead><sc-raw-tr><sc-raw-th>Name<\u002Fsc-raw-th><sc-raw-th>Username<\u002Fsc-raw-th><sc-raw-th>Role<\u002Fsc-raw-th><sc-raw-th><\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n        <sc-raw-tbody>\n          <sc-for list=\"{{ users }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <sc-raw-tr>\n              <sc-raw-td>{{ item.name }}<\u002Fsc-raw-td>\n              <sc-raw-td>{{ item.username }}<\u002Fsc-raw-td>\n              <sc-raw-td><span class=\"tag tag-neutral\">{{ item.roleLabel }}<\u002Fspan><\u002Fsc-raw-td>\n              <sc-raw-td><button class=\"btn btn-ghost\" sc-camel-on-click=\"{{ item.onDelete }}\">Delete<\u002Fbutton><\u002Fsc-raw-td>\n            <\u002Fsc-raw-tr>\n          <\u002Fsc-for>\n        <\u002Fsc-raw-tbody>\n      <\u002Fsc-raw-table>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst FIREBASE_CONFIG = {\n  apiKey: \"AIzaSyDC1XGIhM8LcLbqPmAyzso94_1c03LJ7LQ\",\n  authDomain: \"knowlwdgeempowers.firebaseapp.com\",\n  projectId: \"knowlwdgeempowers\",\n  storageBucket: \"knowlwdgeempowers.firebasestorage.app\",\n  messagingSenderId: \"662979736717\",\n  appId: \"1:662979736717:web:ab692c67972b20567a1ec4\",\n};\nconst DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];\nconst TYPE_TAG = { PDF: 'tag-accent', Quiz: 'tag-neutral', Link: 'tag-outline' };\nconst ROLE_LABEL = { student: 'Student', teacher: 'Teacher', parent: 'Parent' };\n\nfunction emptySchedule() {\n  const s = {};\n  DAYS.forEach((d) => { s[d] = []; });\n  return s;\n}\n\nfunction defaultData() {\n  return {\n    users: [{ id: 1, name: 'Admin', username: 'admin', password: 'admin123', role: 'teacher' }],\n    assignments: [],\n    resources: [],\n    notifications: [],\n    schedule: emptySchedule(),\n  };\n}\n\nclass Component extends DCLogic {\n  state = {\n    ...defaultData(),\n    screen: 'login',\n    currentUser: null,\n    loginUsername: '',\n    loginPassword: '',\n    loginError: '',\n    activeTab: 'overview',\n    activeDay: 'Mon',\n    resourceFilter: 'All',\n    hwSubject: '', hwTitle: '', hwDue: '', hwAssignedTo: 'All Students', hwFileName: '', hwFileData: '',\n    schedDay: 'Mon', schedTime: '', schedSubject: '', schedTeacher: '', schedRoom: '', schedAssignedTo: 'All Students',\n    annTitle: '', annBody: '',\n    resType: 'PDF', resTitle: '', resSubject: '', resAssignedTo: 'All Students', resFileName: '', resFileData: '',\n    newUserName: '', newUserUsername: '', newUserPassword: '', newUserRole: 'student', userError: '',\n  };\n\n  state = { ...this.state, isMobile: typeof window !== 'undefined' && window.innerWidth < 720 };\n\n  componentDidMount() {\n    this._onResize = () => this.setState({ isMobile: window.innerWidth < 720 });\n    window.addEventListener('resize', this._onResize);\n\n    try {\n      if (typeof firebase !== 'undefined') {\n        if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);\n        this.db = firebase.firestore();\n        this._unsub = this.db.collection('keapp').doc('shared').onSnapshot((doc) => {\n          if (doc.exists) {\n            const data = doc.data();\n            this.setState({\n              users: data.users || defaultData().users,\n              assignments: data.assignments || [],\n              resources: data.resources || [],\n              notifications: data.notifications || [],\n              schedule: data.schedule || emptySchedule(),\n              syncReady: true,\n            });\n          } else {\n            this.db.collection('keapp').doc('shared').set(defaultData());\n            this.setState({ syncReady: true });\n          }\n        }, () => this.setState({ syncReady: true, syncError: true }));\n      } else {\n        this.setState({ syncReady: true, syncError: true });\n      }\n    } catch (e) {\n      this.setState({ syncReady: true, syncError: true });\n    }\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n    if (this._unsub) this._unsub();\n  }\n\n  persist() {\n    const { users, assignments, resources, notifications, schedule } = this.state;\n    if (this.db) {\n      this.db.collection('keapp').doc('shared').set({ users, assignments, resources, notifications, schedule }, { merge: true }).catch(() => {});\n    }\n  }\n\n  readFileAsDataUrl(file, cb) {\n    const reader = new FileReader();\n    reader.onload = () => cb(reader.result, file.name);\n    reader.readAsDataURL(file);\n  }\n\n  viewFile(e, dataUrl) {\n    e.preventDefault();\n    fetch(dataUrl).then((res) => res.blob()).then((blob) => {\n      const url = URL.createObjectURL(blob);\n      window.open(url, '_blank');\n    });\n  }\n\n  renderVals() {\n    const { isMobile, screen, currentUser, loginUsername, loginPassword, loginError, activeTab, activeDay, resourceFilter,\n      users, assignments, resources, notifications, schedule,\n      hwSubject, hwTitle, hwDue, hwAssignedTo, hwFileName, hwFileData, schedDay, schedTime, schedSubject, schedTeacher, schedRoom, schedAssignedTo, annTitle, annBody,\n      resType, resTitle, resSubject, resAssignedTo, resFileName, resFileData,\n      newUserName, newUserUsername, newUserPassword, newUserRole, userError } = this.state;\n\n    const role = currentUser?.role || 'student';\n    const roleLabel = ROLE_LABEL[role] || 'Student';\n    const isTeacher = role === 'teacher';\n    const isStudent = role === 'student';\n\n    const goTo = (id) => (e) => { e.preventDefault(); this.setState({ activeTab: id }); };\n    const current = (id) => (activeTab === id ? 'page' : undefined);\n\n    const doLogin = () => {\n      const match = users.find((u) => u.username === loginUsername.trim() && u.password === loginPassword);\n      if (!match) { this.setState({ loginError: 'Incorrect username or password.' }); return; }\n      this.setState({ screen: 'dashboard', currentUser: match, loginUsername: '', loginPassword: '', loginError: '', activeTab: 'overview' });\n    };\n    const doLogout = () => this.setState({ screen: 'login', currentUser: null, activeTab: 'overview' });\n\n    const studentNames = users.filter((u) => u.role === 'student').map((u) => u.name);\n\n    const visibleResources = isStudent\n      ? resources.filter((r) => r.assignedTo === 'All Students' || r.assignedTo === currentUser?.name)\n      : resources;\n    const resourceFilters = ['All', 'PDF', 'Quiz', 'Link'].map((f) => ({\n      label: f, checked: resourceFilter === f, onClick: () => this.setState({ resourceFilter: f }),\n    }));\n    const filteredResourcesRaw = resourceFilter === 'All' ? visibleResources : visibleResources.filter((r) => r.type === resourceFilter);\n    const filteredResources = filteredResourcesRaw.map((r) => ({\n      ...r, tagClass: TYPE_TAG[r.type], showAssignee: !isStudent, hasFile: !!r.fileData,\n      onView: (e) => this.viewFile(e, r.fileData),\n      onDelete: () => { this.setState((s) => ({ resources: s.resources.filter((x) => x.id !== r.id) }), () => this.persist()); },\n    }));\n\n    const dayTabs = DAYS.map((d) => ({ label: d, checked: activeDay === d, onClick: () => this.setState({ activeDay: d }) }));\n    const daySchedule = schedule[activeDay] || [];\n    const visibleDaySchedule = isStudent\n      ? daySchedule.filter((item) => !item.assignedTo || item.assignedTo === 'All Students' || item.assignedTo === currentUser?.name)\n      : daySchedule;\n    const activeDaySchedule = visibleDaySchedule.map((item) => ({\n      ...item, assignedTo: item.assignedTo || 'All Students',\n      onDelete: () => { this.setState((s) => ({ schedule: { ...s.schedule, [activeDay]: s.schedule[activeDay].filter((x) => x !== item) } }), () => this.persist()); },\n    }));\n\n    const visibleAssignments = isStudent\n      ? assignments.filter((a) => !a.assignedTo || a.assignedTo === 'All Students' || a.assignedTo === currentUser?.name)\n      : assignments;\n    const assignmentsWithDelete = visibleAssignments.map((a) => ({\n      ...a, hasFile: !!a.fileData, showAssignee: !isStudent,\n      onView: (e) => this.viewFile(e, a.fileData),\n      onDelete: () => { this.setState((s) => ({ assignments: s.assignments.filter((x) => x.id !== a.id) }), () => this.persist()); },\n    }));\n    const notificationsWithDelete = notifications.map((n) => ({\n      ...n, onDelete: () => { this.setState((s) => ({ notifications: s.notifications.filter((x) => x.id !== n.id) }), () => this.persist()); },\n    }));\n    const usersWithDelete = users.map((u) => ({\n      ...u, roleLabel: ROLE_LABEL[u.role] || u.role,\n      onDelete: () => { this.setState((s) => ({ users: s.users.filter((x) => x.id !== u.id) }), () => this.persist()); },\n    }));\n\n    const studentUsers = users.filter((u) => u.role === 'student');\n    const studentProfiles = studentUsers.map((u) => ({\n      name: u.name, username: u.username,\n      homeworkCount: assignments.filter((a) => !a.assignedTo || a.assignedTo === 'All Students' || a.assignedTo === u.name).length,\n      resourceCount: resources.filter((r) => r.assignedTo === 'All Students' || r.assignedTo === u.name).length,\n      scheduleCount: DAYS.reduce((sum, d) => sum + (schedule[d] || []).filter((i) => !i.assignedTo || i.assignedTo === 'All Students' || i.assignedTo === u.name).length, 0),\n    }));\n\n    const addAssignment = () => {\n      if (!hwSubject.trim() || !hwTitle.trim()) return;\n      this.setState((s) => ({\n        assignments: [{ id: Date.now(), subject: hwSubject, title: hwTitle, due: hwDue || 'TBD', status: 'Upcoming', tagClass: 'tag-neutral', assignedTo: hwAssignedTo, fileName: hwFileName, fileData: hwFileData }, ...s.assignments],\n        hwSubject: '', hwTitle: '', hwDue: '', hwFileName: '', hwFileData: '',\n      }), () => this.persist());\n    };\n    const addScheduleItem = () => {\n      if (!schedSubject.trim() || !schedTime.trim()) return;\n      this.setState((s) => ({\n        schedule: { ...s.schedule, [schedDay]: [...s.schedule[schedDay], { time: schedTime, subject: schedSubject, teacher: schedTeacher || 'TBD', room: schedRoom || '—', assignedTo: schedAssignedTo }] },\n        schedTime: '', schedSubject: '', schedTeacher: '', schedRoom: '',\n      }), () => this.persist());\n    };\n    const addAnnouncement = () => {\n      if (!annTitle.trim()) return;\n      this.setState((s) => ({\n        notifications: [{ id: Date.now(), title: annTitle, body: annBody, time: 'just now' }, ...s.notifications],\n        annTitle: '', annBody: '',\n      }), () => this.persist());\n    };\n    const addResource = () => {\n      if (!resTitle.trim()) return;\n      this.setState((s) => ({\n        resources: [{ id: Date.now(), type: resType, title: resTitle, subject: resSubject || 'General', assignedTo: resAssignedTo, fileName: resFileName, fileData: resFileData }, ...s.resources],\n        resTitle: '', resSubject: '', resFileName: '', resFileData: '',\n      }), () => this.persist());\n    };\n    const addUser = () => {\n      if (!newUserName.trim() || !newUserUsername.trim() || !newUserPassword.trim()) return;\n      if (users.some((u) => u.username === newUserUsername.trim())) {\n        this.setState({ userError: 'That username is already taken.' }); return;\n      }\n      this.setState((s) => ({\n        users: [...s.users, { id: Date.now(), name: newUserName, username: newUserUsername.trim(), password: newUserPassword, role: newUserRole }],\n        newUserName: '', newUserUsername: '', newUserPassword: '', newUserRole: 'student', userError: '',\n      }), () => this.persist());\n    };\n\n    const weekdayShort = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][new Date().getDay()];\n    const todaySchedule = schedule[weekdayShort] || [];\n\n    const formGrid = (desktopCols) => (isMobile ? '1fr' : desktopCols);\n\n    return {\n      isMobile,\n      formGridHw: formGrid('1fr 2fr 1fr auto'),\n      formGridRes: formGrid('0.8fr 1.5fr 1fr auto'),\n      formGridSched: formGrid('0.8fr 1fr 1.3fr 1.1fr 0.7fr auto'),\n      formGridAnn: formGrid('1fr 2fr auto'),\n      formGridUser: formGrid('1fr 1fr 1fr 1fr auto'),\n      contentPadding: isMobile ? 'var(--space-4)' : 'var(--space-6)',\n      isLogin: screen === 'login',\n      isApp: screen === 'dashboard',\n      loginUsername, loginPassword,\n      setLoginUsername: (e) => this.setState({ loginUsername: e.target.value }),\n      setLoginPassword: (e) => this.setState({ loginPassword: e.target.value }),\n      hasLoginError: !!loginError, loginError,\n      doLogin, doLogout,\n      roleLabel, isTeacher, isStudent,\n      currentUserName: currentUser?.name || '',\n\n      navOverview: goTo('overview'), ariaOverview: current('overview'),\n      navHomework: goTo('homework'), ariaHomework: current('homework'),\n      navResources: goTo('resources'), ariaResources: current('resources'),\n      navSchedule: goTo('schedule'), ariaSchedule: current('schedule'),\n      navNotifications: goTo('notifications'), ariaNotifications: current('notifications'),\n      navUsers: goTo('users'), ariaUsers: current('users'),\n      navStudents: goTo('students'), ariaStudents: current('students'),\n\n      pageTitle: ({ overview: 'Overview', homework: 'Homework', resources: 'Resources', schedule: 'Schedule', notifications: 'Notifications', users: 'Users', students: 'Students' })[activeTab] || 'Overview',\n      overviewGreeting: isStudent ? `Welcome back, ${(currentUser?.name || '').split(' ')[0]} — here's what's happening today.` : \"Here's what's happening today.\",\n      showOverview: activeTab === 'overview',\n      showHomework: activeTab === 'homework',\n      showResources: activeTab === 'resources',\n      showSchedule: activeTab === 'schedule',\n      showNotifications: activeTab === 'notifications',\n      showUsers: activeTab === 'users' && isTeacher,\n      showStudents: activeTab === 'students' && isTeacher,\n      hasStudents: studentProfiles.length > 0,\n      hasNoStudents: studentProfiles.length === 0,\n      studentProfiles,\n\n      homeworkCount: visibleAssignments.length,\n      todayClassCount: todaySchedule.length,\n      todayLabel: DAYS.includes(weekdayShort) ? `${weekdayShort} schedule` : 'No school today',\n\n      hasAssignments: assignments.length > 0,\n      hasNoAssignments: assignments.length === 0,\n      assignments: assignmentsWithDelete,\n      upcomingAssignments: assignmentsWithDelete.slice(0, 3),\n      hwSubject, hwTitle, hwDue, hwAssignedTo,\n      setHwSubject: (e) => this.setState({ hwSubject: e.target.value }),\n      setHwTitle: (e) => this.setState({ hwTitle: e.target.value }),\n      setHwDue: (e) => this.setState({ hwDue: e.target.value }),\n      setHwAssignedTo: (e) => this.setState({ hwAssignedTo: e.target.value }),\n      hwFileName, hasHwFile: !!hwFileName,\n      setHwFile: (e) => { const f = e.target.files?.[0]; if (f) this.readFileAsDataUrl(f, (data, name) => this.setState({ hwFileData: data, hwFileName: name })); },\n      addAssignment,\n\n      studentNames,\n      resourceFilters,\n      hasFilteredResources: filteredResources.length > 0,\n      hasNoFilteredResources: filteredResources.length === 0,\n      filteredResources,\n      resType, resTitle, resSubject, resAssignedTo,\n      setResType: (e) => this.setState({ resType: e.target.value }),\n      setResTitle: (e) => this.setState({ resTitle: e.target.value }),\n      setResSubject: (e) => this.setState({ resSubject: e.target.value }),\n      setResAssignedTo: (e) => this.setState({ resAssignedTo: e.target.value }),\n      resFileName, hasResFile: !!resFileName,\n      setResFile: (e) => { const f = e.target.files?.[0]; if (f) this.readFileAsDataUrl(f, (data, name) => this.setState({ resFileData: data, resFileName: name })); },\n      addResource,\n\n      dayOptions: DAYS,\n      dayTabs,\n      hasScheduleForDay: activeDaySchedule.length > 0,\n      hasNoScheduleForDay: activeDaySchedule.length === 0,\n      activeDaySchedule,\n      schedDay, schedTime, schedSubject, schedTeacher, schedRoom,\n      setSchedDay: (e) => this.setState({ schedDay: e.target.value }),\n      setSchedTime: (e) => this.setState({ schedTime: e.target.value }),\n      setSchedSubject: (e) => this.setState({ schedSubject: e.target.value }),\n      setSchedTeacher: (e) => this.setState({ schedTeacher: e.target.value }),\n      setSchedRoom: (e) => this.setState({ schedRoom: e.target.value }),\n      schedAssignedTo,\n      setSchedAssignedTo: (e) => this.setState({ schedAssignedTo: e.target.value }),\n      addScheduleItem,\n\n      hasNotifications: notifications.length > 0,\n      hasNoNotifications: notifications.length === 0,\n      notifications: notificationsWithDelete,\n      recentNotifications: notificationsWithDelete.slice(0, 3),\n      annTitle, annBody,\n      setAnnTitle: (e) => this.setState({ annTitle: e.target.value }),\n      setAnnBody: (e) => this.setState({ annBody: e.target.value }),\n      addAnnouncement,\n\n      users: usersWithDelete,\n      newUserName, newUserUsername, newUserPassword, newUserRole,\n      hasUserError: !!userError, userError,\n      setNewUserName: (e) => this.setState({ newUserName: e.target.value }),\n      setNewUserUsername: (e) => this.setState({ newUserUsername: e.target.value }),\n      setNewUserPassword: (e) => this.setState({ newUserPassword: e.target.value }),\n      setNewUserRole: (e) => this.setState({ newUserRole: e.target.value }),\n      addUser,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
